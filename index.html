<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKR Strategic Dash | 10x Insight Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-green: #00ffcc; /* 戦略・実行カラー */
            --lime-green: #a3e635; /* 洞察・内省カラー */
            --bg-dark: #050a10;
            --warning-amber: #ffaa00;
            --node-bg: rgba(5, 35, 35, 0.95);
            --panel-bg: rgba(5, 12, 10, 0.98);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; margin: 0; height: 100vh; width: 100vw; touch-action: none;
            user-select: none;
        }
        #app-container {
            position: relative; width: 100%; height: 100%; display: flex; flex-direction: column;
            background: radial-gradient(circle at center, #0a2020 0%, #050a10 100%);
        }
        .grid-bg {
            position: absolute; inset: 0; opacity: 0.1; pointer-events: none;
            background-image: linear-gradient(var(--neon-green) 1px, transparent 1px), linear-gradient(90deg, var(--neon-green) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        /* Hint Ticker - ライムグリーン基調 */
        #hint-ticker {
            width: 100%; min-height: 56px; background: rgba(163, 230, 53, 0.05);
            border-bottom: 1px solid rgba(163, 230, 53, 0.3);
            padding: 12px 20px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: var(--lime-green);
            text-align: center; letter-spacing: 0.05em; z-index: 100;
            box-shadow: inset 0 0 15px rgba(163, 230, 53, 0.05);
        }
        #hint-text::after {
            content: '|'; animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%;
            background: var(--panel-bg); z-index: 2000; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-right: 1px solid var(--neon-green); padding: 20px; display: flex; flex-direction: column;
            box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        #sidebar.open { transform: translateX(100%); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            display: none; z-index: 1500; backdrop-filter: blur(3px);
        }
        .overlay.show { display: block; }
        
        /* Nodes */
        .center-node {
            position: absolute; width: 180px; min-height: 100px; z-index: 50; padding: 15px;
            background: linear-gradient(145deg, #004d40, #001a1a);
            border: 2px solid var(--neon-green); border-radius: 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.4);
        }
        .node {
            position: absolute; min-width: 130px; padding: 16px 20px; z-index: 10;
            background: var(--node-bg); border: 1px solid rgba(0, 255, 204, 0.5);
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); transition: opacity 0.3s;
        }
        /* Custom Modal */
        #modal-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 3000;
            justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(8px);
        }
        #modal-box {
            background: #0f1a1a; border: 1px solid var(--neon-green);
            width: 100%; max-width: 320px; border-radius: 35px; padding: 28px;
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.3);
        }
        /* Back Button Area - ライムグリーン */
        #btn-back {
            background: rgba(163, 230, 53, 0.12); 
            border: 1px solid var(--lime-green); 
            color: var(--lime-green);
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="grid-bg"></div>

    <!-- Header (最上部：ネオン) -->

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>

        <button id="btn-back" class="flex items-center gap-2 px-5 py-2.5 rounded-xl font-black text-[11px] uppercase tracking-wider shadow-lg active:scale-95 transition-transform">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg>
            <span id="back-label">Back</span>
        </button>
    </div>

    <div id="toast" class="fixed top-40 left-1/2 -translate-x-1/2 z-[4000] bg-[#00ffcc] text-black px-4 py-2 rounded-full font-bold text-[10px] opacity-0 transition-opacity duration-300 pointer-events-none shadow-lg">SUCCESS</div>
    <div class="overlay" id="overlay"></div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black text-cyan-400 tracking-tighter uppercase">Strategy Cloud</h2>
            <button id="close-sidebar" class="text-gray-500 p-2">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto pr-1" id="map-list"></div>
        <button class="w-full py-4 bg-cyan-500 text-black rounded-2xl mt-4 text-sm font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform" id="new-map-btn">
            + New Project
        </button>
    </div>

    <div id="modal-container">
        <div id="modal-box">
            <h3 id="modal-title" class="text-cyan-400 font-black text-lg mb-6 uppercase tracking-tighter">Edit Node</h3>
            <div id="modal-content" class="space-y-5 mb-8">
                <div>
                    <label class="text-[9px] text-gray-500 font-black uppercase tracking-widest ml-1 mb-1 block">Label</label>
                    <input type="text" id="input-label" class="w-full bg-black border border-cyan-900 rounded-xl p-4 text-white focus:border-cyan-400 outline-none text-sm font-bold">
                </div>
                <div id="value-fields" class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[9px] text-gray-500 font-black uppercase tracking-widest ml-1 mb-1 block">Value</label>
                        <input type="text" id="input-value" class="w-full bg-black border border-cyan-900 rounded-xl p-4 text-white focus:border-cyan-400 outline-none text-sm font-bold">
                    </div>
                    <div class="w-24">
                        <label class="text-[9px] text-gray-500 font-black uppercase tracking-widest ml-1 mb-1 block">Unit</label>
                        <select id="input-unit" class="w-full h-[52px] bg-black border border-cyan-900 rounded-xl px-2 text-cyan-400 outline-none appearance-none text-center font-black text-sm">
                            <option value="%">%</option>
                            <option value="M$">M$</option>
                            <option value="社">社</option>
                            <option value="件">件</option>
                            <option value="">None</option>
                        </select>
                    </div>
                </div>
                <p id="modal-desc" class="text-gray-400 text-sm hidden font-bold"></p>
            </div>
            <div class="flex gap-3">
                <button id="modal-cancel" class="flex-1 py-4 border border-red-900 text-red-500 rounded-2xl font-black text-[11px] uppercase tracking-widest active:bg-red-900/20">Abort</button>
                <button id="modal-ok" class="flex-1 py-4 bg-cyan-500 text-black rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95">Confirm</button>
            </div>
        </div>
    </div>

    <main id="viz-area" class="relative flex-1 flex items-center justify-center overflow-hidden">
    </main>

    <footer class="relative z-50 p-6 pb-12 flex justify-between items-center bg-[#050a10]/95 border-t border-cyan-500/10">
        <button id="btn-reset" class="text-red-500 font-black text-[11px] px-5 py-3 border border-red-900 rounded-xl uppercase tracking-widest active:bg-red-900/20 shadow-lg shadow-red-900/10">Reset</button>
        <button id="btn-add" class="w-16 h-16 bg-[#00ffcc] text-black rounded-full flex items-center justify-center shadow-[0_0_35px_rgba(0,255,204,0.6)] -mt-14 active:scale-90 transition-transform">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="btn-sync" class="text-cyan-400 font-black text-[11px] px-5 py-3 border border-cyan-900 rounded-xl uppercase tracking-widest active:bg-cyan-900/20 shadow-lg shadow-cyan-900/10">Cloud Sync</button>
    </footer>
</div>

<script>
    /** --- CONFIGURATION --- **/
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxpjj3BRsCRNzvnE8prKUi1GuGmyAVudSEeJmOTmziBA9hHWTCOoSZNfJEwDjduLbcdNQ/exec";

        "思考が人生を形作り、感情が人生をコントロールしている。",

        "短期的な快楽が長期的な苦痛を生む構造（依存ループ）を直視せよ。",
        "成功している時ほど、次の「衰退ループ」の種を警戒せよ。",
        "「いつかやる」ループを「今、5分だけやる」で強制終了する。",
        "完璧主義というループを「完了主義（スピード）」で上書きせよ。",
        "困難に直面した時こそ、ご先祖様に恥じない行動を貫く。",
        "自分の限界は、自分の思考が決めている境界線に過ぎない。",

        "競争相手を見るのをやめ、到達すべき「理想の極致」だけを見つめよ。",
        "自分の名声を気にする時間を、自分の「遺産」を創る時間に変えよ。",
        "本物のリーダーはフォロワーではなく、新しいリーダーを創る。",
        "あなたが想像できる最高の自分になれ。それが世界への最大の貢献。",

        "AIを前提とした「新しいOS」を組み、手作業を構造から消し去れ。",

        "報告書を厚くするな。A4一枚で要旨をまとめ、即決を促せ。",

        "OKR達成率は60〜70%を狙う。100%達成は目標が低すぎた証拠。",
        "自らを律し、範を示せ。目的を失ったシステムは手段を目的化し始める。",
        "未来を予測する最良の方法は、それを自ら創り出すことである。",
        "最大の失敗は、目標が低すぎて達成してしまうことにある。",
        "既存のルールに従うな。新しいゲームのルールを自ら書き上げよ。"

    /** --- STATE --- **/
    let allMaps = JSON.parse(localStorage.getItem('okr_v4_8_maps')) || { "New Strategy": { label: "", value: "0", unit: "%", children: [] } };
    let currentMapId = localStorage.getItem('okr_v4_8_current_id') || Object.keys(allMaps)[0];
    let navigationPath = [];
    let isPaused = false;
    let angle = 0;
    const DEFAULT_SPEED = 0.001;
    let rotationSpeed = DEFAULT_SPEED;
    const radius = 135;

    /** --- ELEMENTS --- **/
    const vizArea = document.getElementById('viz-area');
    const modal = document.getElementById('modal-container');
    const inputLabel = document.getElementById('input-label');
    const inputValue = document.getElementById('input-value');
    const inputUnit = document.getElementById('input-unit');
    const toast = document.getElementById('toast');
    const hintTextEl = document.getElementById('hint-text');
    let modalAction = null;

    /** --- TYPING ANIMATION (120ms Slow) --- **/
    let currentHintIndex = -1;
    function typeHint() {
        let nextIndex;
        do { nextIndex = Math.floor(Math.random() * HINTS.length); } while (nextIndex === currentHintIndex);
        currentHintIndex = nextIndex;
        const text = HINTS[currentHintIndex];
        hintTextEl.innerText = "";
        let i = 0;
        const interval = setInterval(() => {
            if (i < text.length) { hintTextEl.innerText += text.charAt(i); i++; } 
            else { clearInterval(interval); setTimeout(typeHint, 8000); }
        }, 120);
    }

    /** --- HELPERS --- **/
    function getCurrentNode() {
        let node = allMaps[currentMapId];
        if(!node) return null;
        for (let idx of navigationPath) { if(node.children && node.children[idx]) node = node.children[idx]; }
        return node;
    }
    function showToast(msg) { toast.innerText = msg; toast.style.opacity = 1; setTimeout(() => toast.style.opacity = 0, 2000); }
    function save() { localStorage.setItem('okr_v4_8_maps', JSON.stringify(allMaps)); localStorage.setItem('okr_v4_8_current_id', currentMapId); }

    /** --- GAS CLOUD --- **/
    async function gasSync(action) {
        if(!GAS_URL) { showToast("GAS URL NOT SET"); return; }
        showToast(`${action.toUpperCase()}ING...`);
        try {
            const payload = { action: action, data: { allMaps: allMaps, currentMapId: currentMapId } };
            const response = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
            if (action === 'load') {
                const cloudData = await response.json();
                if (cloudData && cloudData.allMaps) { allMaps = cloudData.allMaps; currentMapId = cloudData.currentMapId; save(); render(); }
            }
            showToast(`CLOUD ${action.toUpperCase()} SUCCESS`);
        } catch (e) { showToast("CLOUD SYNC ERROR"); }
    }

    /** --- MODAL --- **/
    function openModal(type, options = {}) {
        document.getElementById('modal-title').innerText = options.title || 'Mission Control';
        document.getElementById('modal-desc').classList.add('hidden');
        document.getElementById('value-fields').classList.remove('hidden');
        document.getElementById('input-label').parentElement.classList.remove('hidden');
        if(type === 'edit' || type === 'add' || type === 'new_map') {
            inputLabel.value = options.label || ''; inputValue.value = options.value || '0'; inputUnit.value = options.unit || '%';
        } else if(type === 'confirm') {
            document.getElementById('modal-desc').innerText = options.desc; document.getElementById('modal-desc').classList.remove('hidden');
            document.getElementById('value-fields').classList.add('hidden'); document.getElementById('input-label').parentElement.classList.add('hidden');
        }
        modal.style.display = 'flex'; modalAction = options.onConfirm;
    }
    document.getElementById('modal-ok').onclick = () => { if(modalAction) modalAction({ label: inputLabel.value, value: inputValue.value, unit: inputUnit.value }); modal.style.display = 'none'; save(); render(); };
    document.getElementById('modal-cancel').onclick = () => modal.style.display = 'none';

    /** --- RENDER --- **/
    function render() {
        vizArea.innerHTML = '';
        const node = getCurrentNode();
        if(!node) return;
        document.getElementById('display-map-id').innerText = currentMapId;
        const navArea = document.getElementById('nav-area');
        if(navigationPath.length > 0) {
            navArea.classList.remove('hidden');
            let parent = allMaps[currentMapId];
            for(let i=0; i<navigationPath.length-1; i++) parent = parent.children[navigationPath[i]];
            document.getElementById('back-label').innerText = parent.label || "(Empty)";
        } else { navArea.classList.add('hidden'); }

        const center = document.createElement('div');
        center.className = 'center-node';
        center.innerHTML = `
            <div class="text-[17px] font-black uppercase tracking-tight px-1 min-h-[1.2em]">${node.label}</div>
            <div class="text-[14px] text-cyan-400 font-black mt-2 tracking-widest">${node.value}${node.unit}</div>
            <div id="center-edit-btn" class="absolute -top-3 -right-3 w-10 h-10 bg-black border-2 border-cyan-500 rounded-full flex items-center justify-center text-cyan-400 shadow-xl active:scale-90 transition-transform">
                <span class="text-xs">✎</span>
            </div>
        `;
        center.querySelector('#center-edit-btn').onclick = (e) => { e.stopPropagation(); openModal('edit', { title: 'Update Center Node', label: node.label, value: node.value, unit: node.unit, onConfirm: (res) => { node.label = res.label; node.value = res.value; node.unit = res.unit; } }); };
        vizArea.appendChild(center);

        if(node.children) {
            node.children.forEach((child, i) => {
                const childEl = document.createElement('div');
                childEl.className = 'node'; childEl.id = `node-${i}`;
                childEl.innerHTML = `
                    <div class="text-[12px] font-black text-white uppercase tracking-tighter truncate w-full">${child.label}</div>
                    <div class="text-[12px] text-cyan-400 font-black mt-1">${child.value}${child.unit}</div>
                    <div class="absolute -top-3 -right-2 flex gap-1 z-50">
                        <div class="edit-btn w-8 h-8 bg-black border border-cyan-500 rounded-full flex items-center justify-center text-cyan-400 shadow-xl active:bg-cyan-900 transition-colors">✎</div>
                        <div class="del-btn w-8 h-8 bg-black border border-red-500 rounded-full flex items-center justify-center text-red-500 shadow-xl active:bg-red-900 transition-colors">✕</div>
                    </div>
                `;
                childEl.onclick = (e) => { if(e.target.closest('.edit-btn') || e.target.closest('.del-btn')) return; navigationPath.push(i); angle = 0; render(); };
                childEl.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); openModal('edit', { title: 'Edit Mission', label: child.label, value: child.value, unit: child.unit, onConfirm: (res) => { child.label = res.label; child.value = res.value; child.unit = res.unit; } }); };
                childEl.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); openModal('confirm', { title: 'Delete Node', desc: `REMOVE "${child.label}"?`, onConfirm: () => { node.children.splice(i, 1); showToast("REMOVED"); } }); };
                vizArea.appendChild(childEl);
            });
        }
        renderSidebar();
    }

    function renderSidebar() {
        const list = document.getElementById('map-list'); list.innerHTML = '';
        Object.keys(allMaps).forEach(id => {
            const item = document.createElement('div');
            item.className = `flex justify-between items-center p-4 rounded-xl border mb-2 transition-all active:scale-95 ${id === currentMapId ? 'border-cyan-400 bg-cyan-500/10' : 'border-white/5 bg-white/5'}`;
            item.innerHTML = `<span class="text-xs font-black uppercase truncate pr-2 tracking-tight">${id}</span><button class="text-red-500 text-[10px] font-black border border-red-900 px-2 py-1 rounded">DEL</button>`;
            item.onclick = (e) => {
                if(e.target.tagName === 'BUTTON') { openModal('confirm', { title: 'Delete Map', desc: `DELETE PROJECT "${id}"?`, onConfirm: () => { delete allMaps[id]; if(currentMapId === id) { currentMapId = Object.keys(allMaps)[0] || 'Default'; if(!allMaps[currentMapId]) allMaps[currentMapId] = { label: "", value: "0", unit: "%", children: [] }; } navigationPath = []; } }); return; }
                currentMapId = id; navigationPath = []; render(); document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show');
            };
            list.appendChild(item);
        });
    }

    /** --- LOOP --- **/
    function animate() {
        if(!isPaused) angle += rotationSpeed;
        const node = getCurrentNode();
        if(node && node.children) {
            node.children.forEach((_, i) => {
                const el = document.getElementById(`node-${i}`);
                if(!el) return;
                const itemAngle = angle + (i / node.children.length) * Math.PI * 2;
                const x = Math.cos(itemAngle) * radius; const y = Math.sin(itemAngle) * radius; const depth = Math.sin(itemAngle);
                el.style.transform = `translate(${x}px, ${y}px) scale(${0.85 + (depth + 1) * 0.12})`;
                el.style.zIndex = Math.round((depth + 1) * 10); el.style.opacity = 0.6 + (depth + 1) / 2.5;
            });
        }
        requestAnimationFrame(animate);
    }

    /** --- BUTTON EVENTS --- **/
    document.getElementById('btn-menu').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); };
    document.getElementById('overlay').onclick = document.getElementById('close-sidebar').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); };
    document.getElementById('btn-pause').onclick = () => { isPaused = !isPaused; document.getElementById('svg-stop').classList.toggle('hidden', isPaused); document.getElementById('svg-play').classList.toggle('hidden', !isPaused); };
    document.getElementById('btn-save').onclick = () => gasSync('save');
    document.getElementById('btn-back').onclick = () => { navigationPath.pop(); render(); };
    document.getElementById('btn-reset').onclick = () => { const node = getCurrentNode(); openModal('confirm', { title: 'Reset Action', desc: 'DELETE ALL CHILDREN IN THIS LEVEL?', onConfirm: () => { node.children = []; showToast("RESET SUCCESS"); } }); };
    document.getElementById('btn-add').onclick = () => { const node = getCurrentNode(); openModal('add', { title: 'New Mission', unit: node.unit || '%', onConfirm: (res) => { if(!node.children) node.children = []; node.children.push({ label: res.label, value: res.value, unit: res.unit, children: [] }); } }); };
    document.getElementById('new-map-btn').onclick = () => { openModal('new_map', { title: 'Initialize Map', label: 'New Project', value: '0', unit: '%', onConfirm: (res) => { allMaps[res.label] = { label: "", value: res.value, unit: res.unit, children: [] }; currentMapId = res.label; navigationPath = []; render(); document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); } }); };
    document.getElementById('btn-sync').onclick = () => gasSync('load');

    /** --- DRAG --- **/
    let sX = 0, isD = false;
    vizArea.addEventListener('touchstart', (e) => { if(e.target.closest('.node') || e.target.closest('button')) return; isD = true; sX = e.touches[0].clientX; });
    window.addEventListener('touchmove', (e) => { if(!isD) return; const delta = e.touches[0].clientX - sX; angle += delta * 0.005; sX = e.touches[0].clientX; });
    window.addEventListener('touchend', () => { isD = false; const decelerate = setInterval(() => { if (Math.abs(rotationSpeed - DEFAULT_SPEED) < 0.0001) { rotationSpeed = DEFAULT_SPEED; clearInterval(decelerate); } else { rotationSpeed += (DEFAULT_SPEED - rotationSpeed) * 0.1; } }, 30); });

    render(); animate(); typeHint();
</script>
</body>
</html>
